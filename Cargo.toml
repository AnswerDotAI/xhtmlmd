[package]
name = "xhtml-md-parser"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "A bounded-time, Pandoc-leaning Markdown parser with GFM, Extra/kramdown, math, fenced divs, and XHTML output."
repository = "https://example.invalid/local-artifact"

[lib]
name = "xhtml_md_parser"
path = "src/lib.rs"

[[bin]]
name = "xhtml-md"
path = "src/main.rs"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[dependencies]
html-escape = "0.2"

[dev-dependencies]
ego-tree = "0.11.0"
scraper = "0.27.0"
